name: build configurations
on:
  pull_request:
    paths:
      - "**.nix"
      - "**.lock"
      - "**.toml"
      - "**.yaml"
      - "**.yml"
      - "**.json"
      - "**.sh"
  push:
    branches:
      - main
    paths:
      - "**.nix"
      - "**.lock"
      - "**.toml"
      - "**.yaml"
      - "**.yml"
      - "**.json"
      - "**.sh"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  check-linux:
    name: Check flake definisions on Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Connect to Tailscale
        uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888 # v4.1.3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:nix
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
      - name: Setup attic client
        run: |
          nix profile install nixpkgs#attic-client
          attic login --set-default home https://attic.taile2777.ts.net "$ATTIC_TOKEN"
          attic use home
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
      - name: GC
        run: |
          df -h
          rm -rf "${AGENT_TOOLSDIRECTORY}"
          df -h
      - name: Check
        run: |
          #nix build --impure --no-link --show-trace --system x86_64-linux \
          #  .#nixosConfigurations.maindesk.config.system.build.toplevel
          nix flake check
          df -h
  check-darwin:
    name: Check flake definisions on Mac
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Connect to Tailscale
        uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888 # v4.1.3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:nix
      - name: Install nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
      - name: Setup attic client
        run: |
          nix profile install nixpkgs#attic-client
          attic login --set-default home https://attic.taile2777.ts.net "$ATTIC_TOKEN"
          attic use home
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
      - name: GC
        run: |
          df -h
          rm -rf "${AGENT_TOOLSDIRECTORY}"
          df -h
      - name: Check
        run: |
          # Check only Darwin-compatible outputs to avoid building Linux packages
          # (nix flake check tries to evaluate nixosConfigurations which requires Linux derivations)
          nix eval .#darwinConfigurations.dreamac.config.system.build.toplevel
          nix eval .#devShells.aarch64-darwin.default
          nix eval .#packages.aarch64-darwin --apply 'x: builtins.attrNames x'
          nix eval .#formatter.aarch64-darwin
          df -h
  build-linux:
    name: Build packages on Linux
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        packages:
          - jetbrains-dolphin
          - jetbrains-nautilus
          - wallpaper-springcity
          - hyprland
          - hyprpolkitagent
          - vivaldi
          - chromium
          - spotify
          - obsidian
          - discord
          - discord-ptb
          - slack
          - teams-for-linux
          - vscode
          - zoom-us
          - noto-fonts-cjk-sans
          - noto-fonts-cjk-serif
          - noto-fonts
          - zen-browser
          - rustowl
          # - beutl
          - isaacsim-webrtc-streaming-client
          - claude-desktop
          - claude-code
          - dolphin
          - noctalia-shell
          - xwayland-satellite
          - cachyos-kernel-latest
          - opencode
          - mixxx
          - ghr
          - cnowledje
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Connect to Tailscale
        uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888 # v4.1.3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:nix
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
      #- uses: cachix/cachix-action@v14
      #  with:
      #    name: turtton
      #    authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      # Original: https://github.com/natsukium/dotfiles/blob/main/.github/workflows/test.yml
      - name: Setup attic client
        run: |
          nix profile install nixpkgs#attic-client
          attic login --set-default home https://attic.taile2777.ts.net "$ATTIC_TOKEN"
          attic use home
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
      - name: GC
        run: |
          df -h
          rm -rf "${AGENT_TOOLSDIRECTORY}"
          df -h
      - name: Build
        run: |
          #nix build --impure --no-link --show-trace --system x86_64-linux \
          #  .#nixosConfigurations.maindesk.config.system.build.toplevel
          nix build --fallback ".#$PACKAGE"
          df -h
        env:
          PACKAGE: ${{ matrix.packages }}
      - name: Push to attic
        if: success()
        run: attic push home ./result
  build-darwin:
    name: Build packages on Mac
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        packages:
          - rustowl
          - claude-code
          - opencode
          - ghr
          - zen-browser
          - cnowledje
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Connect to Tailscale
        uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888 # v4.1.3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:nix
      - name: Install nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
      - name: Setup attic client
        run: |
          nix profile install nixpkgs#attic-client
          attic login --set-default home https://attic.taile2777.ts.net "$ATTIC_TOKEN"
          attic use home
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
      - name: GC
        run: |
          df -h
          rm -rf "${AGENT_TOOLSDIRECTORY}"
          df -h
      - name: Build
        run: |
          #nix build --impure --no-link --show-trace --system x86_64-linux \
          #  .#nixosConfigurations.maindesk.config.system.build.toplevel
          nix build --fallback ".#${PACKAGE}"
          df -h
        env:
          PACKAGE: ${{ matrix.packages }}
      - name: Push to attic
        if: success()
        run: attic push home ./result
  build-rocm-base:
    name: Build ROCm base packages on Linux
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        packages:
          - "nixosConfigurations.maindesk.pkgs.rocmPackages.clr"
          - "nixosConfigurations.maindesk.pkgs.rocmPackages.rocblas"
          - "nixosConfigurations.maindesk.pkgs.rocmPackages.hipblas"
          - "nixosConfigurations.maindesk.pkgs.rocmPackages.miopen"
          - "nixosConfigurations.maindesk.pkgs.rocmPackages.rocminfo"
          - "nixosConfigurations.maindesk.pkgs.mesa^*"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Connect to Tailscale
        uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888 # v4.1.3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:nix
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
      #- uses: cachix/cachix-action@v14
      #  with:
      #    name: turtton
      #    authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      # Original: https://github.com/natsukium/dotfiles/blob/main/.github/workflows/test.yml
      - name: Setup attic client
        run: |
          nix profile install nixpkgs#attic-client
          attic login --set-default home https://attic.taile2777.ts.net "$ATTIC_TOKEN"
          attic use home
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
      - name: GC
        run: |
          df -h
          rm -rf "${AGENT_TOOLSDIRECTORY}"
          df -h
      - name: Build and push
        run: |
          paths_file="$(mktemp)"
          nix build --fallback --no-link --print-out-paths ".#$PACKAGE" > "$paths_file"
          mapfile -t paths < "$paths_file"
          (( ${#paths[@]} > 0 ))
          attic push home "${paths[@]}"
        env:
          PACKAGE: ${{ matrix.packages }}
  build-downstream:
    name: Build downstream packages on Linux
    needs: [build-rocm-base]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        packages:
          - "nixosConfigurations.maindesk.pkgs.firefox"
          - "nixosConfigurations.maindesk.pkgs.ollama"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Connect to Tailscale
        uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888 # v4.1.3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:nix
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
      #- uses: cachix/cachix-action@v14
      #  with:
      #    name: turtton
      #    authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      # Original: https://github.com/natsukium/dotfiles/blob/main/.github/workflows/test.yml
      - name: Setup attic client
        run: |
          nix profile install nixpkgs#attic-client
          attic login --set-default home https://attic.taile2777.ts.net "$ATTIC_TOKEN"
          attic use home
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
      - name: GC
        run: |
          df -h
          rm -rf "${AGENT_TOOLSDIRECTORY}"
          df -h
      - name: Build and push
        run: |
          paths_file="$(mktemp)"
          nix build --fallback --no-link --print-out-paths ".#$PACKAGE" > "$paths_file"
          mapfile -t paths < "$paths_file"
          (( ${#paths[@]} > 0 ))
          attic push home "${paths[@]}"
        env:
          PACKAGE: ${{ matrix.packages }}
  all-workflows-passed:
    name: Checks all workflows passed
    if: always()
    needs: ["check-linux", "check-darwin", "build-linux", "build-darwin", "build-rocm-base", "build-downstream"]
    runs-on: ubuntu-latest
    steps:
      - name: Check job status
        if: ${{ needs.check-linux.result != 'success' || needs.check-darwin.result != 'success' || needs.build-linux.result != 'success' || needs.build-darwin.result != 'success' || needs.build-rocm-base.result != 'success' || needs.build-downstream.result != 'success' }}
        run: |
          echo "One or more jobs failed."
          exit 1
      - name: All jobs passed
        run: echo "All jobs succeeded!"
